<head>

    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/docsify-themeable/style.min.css"

<body>
    <div id="app"></div>

        window.$docsify = {
            name: 'Grant I Carroll',

            loadSidebar: true,
            loadNavbar: true,
            coverpage: true,
            notFoundPage: true,
            auto2top: true,
            executeScript: true,
            maxLevel: 3,
            subMaxLevel: 3,
            search: {

                '/games/.*/_sidebar.md': '/games/_sidebar.md',
