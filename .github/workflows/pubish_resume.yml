name: Publish Resume
on: push
# on:
#   push:
#     paths:
#       - 'programming/resume/README.md'
jobs:
  resume_gen:
    runs-on: ubuntu-18.04
    steps:
      # Setup
      - uses: actions/checkout@v2
      # Run Pandoc to convert Markdown Resume to DOCX
      - uses: docker://pandoc/core:2.9
        with:
          args: >-
            -f gfm
            -t docx
            -o output/GrantICarroll.docx
            programming/resume/README.md
      # Run Pandoc to convert Markdown Resume to PDF
      - uses: docker://pandoc/latex:2.9
        with:
          args: >-
            -f gfm
            -t pdf
            -o GrantICarroll.pdf
            -V geometry:margin=2cm
            programming/resume/README.md
      # Create "latest" release and publish releases
      - uses: EndBug/latest-tag@latest
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "GrantICarroll.docx,GrantICarroll.pdf"
          tag: "latest"
          token: ${{ secrets.GITHUB_TOKEN }}